<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dégradé bleu du pin -->
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF"/>
      <stop offset="50%" stop-color="#1565E0"/>
      <stop offset="100%" stop-color="#0A2A6B"/>
    </linearGradient>

    <!-- Fond sombre du terrain (intérieur du cercle) -->
    <radialGradient id="fieldGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A1F4D"/>
      <stop offset="100%" stop-color="#050F2A"/>
    </radialGradient>

    <!-- Lueur douce autour du pin -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ombre portée au sol -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ombre au sol -->
  <ellipse cx="256" cy="488" rx="60" ry="6" fill="url(#shadow)"/>

  <!-- Forme du pin (goutte) -->
  <path d="M 256 40
           C 140 40, 80 130, 80 222
           C 80 320, 180 380, 256 478
           C 332 380, 432 320, 432 222
           C 432 130, 372 40, 256 40 Z"
        fill="url(#pinGradient)"
        filter="url(#glow)"/>

  <!-- Cercle terrain (zone circulaire) -->
  <circle cx="256" cy="222" r="135" fill="url(#fieldGradient)" stroke="#FFFFFF" stroke-width="6"/>

  <!-- Ligne médiane verticale -->
  <line x1="256" y1="87" x2="256" y2="357" stroke="#FFFFFF" stroke-width="5"/>

  <!-- Cercle central -->
  <circle cx="256" cy="222" r="28" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <circle cx="256" cy="222" r="3.5" fill="#FFFFFF"/>

  <!-- Surface de réparation gauche -->
  <rect x="121" y="172" width="40" height="100" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <!-- Surface de but gauche -->
  <rect x="121" y="197" width="18" height="50" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <!-- Point de penalty gauche -->
  <circle cx="155" cy="222" r="3" fill="#FFFFFF"/>

  <!-- Surface de réparation droite -->
  <rect x="351" y="172" width="40" height="100" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <!-- Surface de but droite -->
  <rect x="373" y="197" width="18" height="50" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <!-- Point de penalty droit -->
  <circle cx="357" cy="222" r="3" fill="#FFFFFF"/>
</svg>
