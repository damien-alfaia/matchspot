# Conf nginx servie par le container matchspot-web.
# Monté en /etc/nginx/conf.d/default.conf:ro.
# Pas de listen 443 ici : Traefik gère HTTPS et fait du reverse proxy
# HTTP interne vers ce container.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/xml+rss
        image/svg+xml;

    # Cache long pour les assets fingerprintés (Vite met un hash dans le nom)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache court pour les autres ressources statiques
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # sitemap.xml et robots.txt avec cache court
    location = /sitemap.xml {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    location = /robots.txt {
        expires 1d;
        try_files $uri =404;
    }

    # SPA fallback : toute URL non-fichier renvoie index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        # Pas de cache sur index.html : pour que les nouveaux déploiements
        # soient pris en compte immédiatement par les clients.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Headers de sécurité de base. Traefik ne les pose pas par défaut.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # Bloque les requêtes vers les fichiers cachés (.git, .env, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Healthcheck pour Docker (curl http://localhost/health depuis le container)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Pas de log access détaillé pour les bots de monitoring
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
