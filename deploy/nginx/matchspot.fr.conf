# Vhost Nginx pour matchspot.fr
# À copier sur le VPS dans /etc/nginx/sites-available/matchspot.fr
# Puis : sudo ln -s /etc/nginx/sites-available/matchspot.fr /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# Certbot ajoutera automatiquement les directives HTTPS (listen 443,
# ssl_certificate...) lors du `sudo certbot --nginx -d matchspot.fr -d www.matchspot.fr`.

server {
    listen 80;
    listen [::]:80;
    server_name matchspot.fr www.matchspot.fr;

    root /var/www/matchspot;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/xml+rss
        image/svg+xml;

    # Cache long pour les assets fingerprintés (Vite met un hash dans le nom)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache court pour les autres ressources statiques
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # sitemap.xml et robots.txt sans cache agressif
    location = /sitemap.xml {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /robots.txt {
        expires 1d;
        try_files $uri =404;
    }

    # SPA fallback : toute URL non-fichier renvoie index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        # Pas de cache sur index.html : pour que les nouveaux déploiements
        # soient pris en compte immédiatement par les clients.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Headers de sécurité de base
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # Bloque les requêtes vers .ht* (Apache résidu)
    location ~ /\.ht {
        deny all;
    }

    # Log dédié pour faciliter le monitoring
    access_log /var/log/nginx/matchspot.access.log;
    error_log  /var/log/nginx/matchspot.error.log;
}
