name: Déploiement MatchSpot

on:
  push:
    branches: [main]
  workflow_dispatch: # permet aussi de relancer manuellement

concurrency:
  group: deploy-main
  cancel-in-progress: false # on attend la fin du précédent pour éviter les corruptions

jobs:
  build-et-deployer:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Installation des dépendances
        working-directory: web
        run: npm ci --prefer-offline --no-audit

      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit

      - name: Tests unitaires
        working-directory: web
        run: npm test

      - name: Build production (sitemap + bundle)
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SITE_URL: https://matchspot.fr
        run: npm run build

      # Action officielle pour SSH-agent : gère correctement la clé multi-ligne
      # (CRLF, BOM, newline final manquant) sans toucher au filesystem.
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Ajouter le VPS aux known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "known_hosts ajouté : $(wc -l < ~/.ssh/known_hosts) entrée(s)"

      - name: Déploiement rsync vers le VPS
        # Cible : /var/www/matchspot/dist/ (le container nginx monte ce dossier
        # en lecture seule via /etc/matchspot/docker-compose.yml).
        # La clé SSH est gérée par ssh-agent, pas besoin de -i.
        run: |
          rsync -avz --delete \
            web/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/matchspot/dist/

      - name: Smoke test post-déploiement
        run: |
          # Attend 3 secondes que Nginx serve la nouvelle version (pas de reload nécessaire,
          # les fichiers sont remplacés atomiquement par rsync).
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://matchspot.fr)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test échoué : status $STATUS"
            exit 1
          fi
          echo "OK : https://matchspot.fr répond 200"
